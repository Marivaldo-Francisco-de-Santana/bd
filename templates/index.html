<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Livros</title>
</head>
<body>
    <h1>CRUD Livros</h1>
    <form action="/criar" method="post">
        <input type="text" name="nome" placeholder="Digite o nome do
livro" required>
        <input type="submit" value="Inserir">
    </form>
...

<h2>Livros:</h2>
<ul>
    {% for livro in livros %}
        <li>{{ livro }}</li>
    {% endfor %}
</ul>
<hr>
...

<h2>Atualizar livro:</h2>
<form action="/alterar" method="post">
    <input type="text" name="old_name" placeholder="Nome atual"
required>
    <input type="text" name="new_name" placeholder="Novo nome"
required>
    <input type="submit" value="Alterar">
</form>
<hr>
...

<h2>Apagar livro:</h2>
<form action="/apagar" method="post">
    <input type="text" name="nome" placeholder="Nome do livro"
required>
    <input type="submit" value="Apagar">
</form>
</body>
</html>
